<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日财经新闻</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>📈 每日财经新闻</h1>
    <p class="subtitle">聚合全球财经资讯 · 每日自动更新</p>
    <div class="controls">
      <div class="tabs" id="langTabs">
        <button class="tab active" data-lang="all">全部</button>
        <button class="tab" data-lang="zh">中文</button>
        <button class="tab" data-lang="en">English</button>
      </div>
      <input type="text" id="searchBox" placeholder="搜索新闻..." />
    </div>
  </header>
  <main id="newsContainer">
    <div class="loading">加载中...</div>
  </main>
  <footer>
    <p>数据来源：BBC · CNBC · Reuters · 36氪 · 虎嗅 | 更新时间：<span id="updateTime">--</span></p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
