<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日财经新闻</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>📈 每日财经新闻</h1>
    <p class="subtitle">聚合全球财经资讯 · 每日自动更新</p>
    <div class="controls">
      <div class="tabs" id="langTabs">
        <button class="tab active" data-lang="all">全部</button>
        <button class="tab" data-lang="zh">中文</button>
        <button class="tab" data-lang="en">English</button>
      </div>
      <div class="tabs" id="catTabs">
        <button class="tab cat-tab active" data-cat="all">🏷 全部分类</button>
        <button class="tab cat-tab" data-cat="AI">🤖 AI</button>
        <button class="tab cat-tab" data-cat="区块链">⛓ 区块链</button>
        <button class="tab cat-tab" data-cat="黄金">🥇 黄金</button>
        <button class="tab cat-tab" data-cat="机器人">🤖 机器人</button>
        <button class="tab cat-tab" data-cat="地缘">🌍 地缘</button>
        <button class="tab cat-tab" data-cat="美债">🏦 美债</button>
        <button class="tab cat-tab" data-cat="科技股">📊 科技股</button>
      </div>
      <input type="text" id="searchBox" placeholder="搜索新闻..." />
    </div>
  </header>
  <main id="newsContainer">
    <div class="loading">加载中...</div>
  </main>
  <footer>
    <p>数据来源：BBC · CNBC · Reuters · 华尔街日报 · 东方财富 · 虎嗅 | 更新时间：<span id="updateTime">--</span> | 共 <span id="totalCount">0</span> 条</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
