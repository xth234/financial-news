name: Fetch Financial News

on:
  schedule:
    - cron: "0 * * * *"   # 每小时整点运行（UTC）
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetcher
        run: python scripts/fetch_news.py

      - name: Commit & push
        run: |
          git config user.name "news-bot"
          git config user.email "bot@localhost"
          git add data/news.json
          git diff --cached --quiet || git commit -m "auto: update news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
